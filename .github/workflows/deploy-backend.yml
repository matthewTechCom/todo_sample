name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  BACKEND_ECR_REPOSITORY_URL: ${{ vars.BACKEND_ECR_REPOSITORY_URL }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
  ECS_SERVICE_NAME: ${{ vars.ECS_SERVICE_NAME }}
  ECS_TASK_DEFINITION_FAMILY: ${{ vars.ECS_TASK_DEFINITION_FAMILY }}
  ECS_CONTAINER_NAME: backend

jobs:
  deploy:
    name: Deploy backend to ECS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Debug AWS caller identity
        run: aws sts get-caller-identity

      - name: Debug backend ECR repository
        run: |
          echo "AWS_REGION=${AWS_REGION}"
          echo "BACKEND_ECR_REPOSITORY_URL=${BACKEND_ECR_REPOSITORY_URL}"
          REPOSITORY_NAME="${BACKEND_ECR_REPOSITORY_URL##*/}"
          aws ecr describe-repositories --repository-names "${REPOSITORY_NAME}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --file backend/Dockerfile.prod \
            --tag "${BACKEND_ECR_REPOSITORY_URL}:${IMAGE_TAG}" \
            --tag "${BACKEND_ECR_REPOSITORY_URL}:latest" \
            --push \
            backend

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION_FAMILY}" \
            --query taskDefinition \
            > task-definition.json

      - name: Render next task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ env.BACKEND_ECR_REPOSITORY_URL }}:${{ github.sha }}

      - name: Deploy task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER_NAME }}
          service: ${{ env.ECS_SERVICE_NAME }}
          wait-for-service-stability: true
