---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/auth/login":
    post:
      summary: Login user and return JWT
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: login success
        '401':
          description: login failure
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required:
                  - email
                  - password
              required:
              - user
servers:
- url: http://localhost:3001
