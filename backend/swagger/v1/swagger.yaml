---
openapi: 3.0.1
info:
  title: API V1
  version: v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  "/api/debug/db-error":
    post:
      summary: Trigger a database error with invalid SQL
      tags:
      - Debug
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '500':
          description: database error triggered
        '401':
          description: unauthorized
  "/api/debug/timeout":
    post:
      summary: Sleep long enough to simulate timeout handling
      tags:
      - Debug
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '504':
          description: timeout simulated
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                seconds:
                  type: integer
  "/api/debug/memory-leak":
    post:
      summary: Retain process memory to simulate leak and OOM pressure
      tags:
      - Debug
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '500':
          description: memory leak simulated
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                megabytes:
                  type: integer
  "/api/debug/500":
    post:
      summary: Return an intentional internal server error
      tags:
      - Debug
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '500':
          description: internal server error returned
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
  "/api/debug/n-plus-one":
    get:
      summary: Intentionally trigger N+1 queries
      tags:
      - Debug
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      security:
      - bearerAuth: []
      responses:
        '200':
          description: n plus one query pattern executed
        '401':
          description: unauthorized
  "/api/v1/auth/signup":
    post:
      summary: Sign up user and return JWT
      tags:
      - Auth
      parameters: []
      responses:
        '201':
          description: signup success
        '422':
          description: signup failure
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                    password_confirmation:
                      type: string
                  required:
                  - email
                  - password
                  - password_confirmation
              required:
              - user
  "/api/v1/auth/login":
    post:
      summary: Login user and return JWT
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: login success
        '401':
          description: login failure
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required:
                  - email
                  - password
              required:
              - user
  "/api/v1/auth/logout":
    delete:
      summary: Logout user
      tags:
      - Auth
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '204':
          description: logout success
        '401':
          description: logout unauthorized
  "/api/v1/me":
    get:
      summary: Get current user
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          description: current user fetched
        '401':
          description: unauthorized
  "/api/v1/todos":
    get:
      summary: List todos
      tags:
      - Todos
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      produces:
      - application/json
      security:
      - bearerAuth: []
      responses:
        '200':
          description: todos fetched
        '401':
          description: unauthorized
    post:
      summary: Create todo
      tags:
      - Todos
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '201':
          description: todo created
        '422':
          description: invalid todo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                todo:
                  type: object
                  properties:
                    title:
                      type: string
                    completed:
                      type: boolean
                  required:
                  - title
              required:
              - todo
  "/api/v1/todos/{id}":
    patch:
      summary: Update todo
      tags:
      - Todos
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: todo updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                todo:
                  type: object
                  properties:
                    title:
                      type: string
                    completed:
                      type: boolean
              required:
              - todo
    delete:
      summary: Delete todo
      tags:
      - Todos
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '204':
          description: todo deleted
servers:
- url: http://localhost:3001
